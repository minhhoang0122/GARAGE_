server:
  port: ${PORT:8081}
  address: 0.0.0.0  # Đảm bảo nghe trên mọi giao diện để Render thấy cổng
  shutdown: graceful
  # Enable response compression
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain
    min-response-size: 1024

spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/GaraManagement}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD} # Bug 133 Fix: Remove hardcoded default password
    driver-class-name: org.postgresql.Driver
    # HikariCP Connection Pool Optimization
    hikari:
      minimum-idle: 1
      maximum-pool-size: 5  # Giảm xuống 5 để tránh quá tải Supabase Free tier
      idle-timeout: 30000
      pool-name: GaraHikariPool
      max-lifetime: 600000 # 10 minutes
      connection-timeout: 30000 # 30 seconds
      keepalive-time: 30000
      leak-detection-threshold: 60000

  # Cloudinary Configuration
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME}
    api-key: ${CLOUDINARY_API_KEY}
    api-secret: ${CLOUDINARY_API_SECRET}

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 11MB
  
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect # ÉP DIALECT: Giải quyết lỗi "Unable to determine Dialect"
    hibernate:
      ddl-auto: none # TẮT để khởi động nhanh (schema đã có sẵn)
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        boot:
          allow_jdbc_metadata_access: false # TĂNG TỐC: Dùng thuộc tính mới thay thế cho 'temp.use_jdbc_metadata_defaults'
        # Batch optimization
        default_batch_fetch_size: 50
        jdbc:
          batch_size: 50
          fetch_size: 50
        order_inserts: true
        order_updates: true
        # Second-level cache
        cache:
          use_second_level_cache: true
          use_query_cache: true
          region:
            factory_class: org.hibernate.cache.jcache.JCacheRegionFactory
        javax:
          cache:
            missing_cache_strategy: create


  # Disable default security login page handled by JwtAuthFilter
  # No spring.security.user needed

  # Enable caching
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=300s

# JWT Configuration
jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000  # 24 hours in milliseconds

# CORS
cors:
  allowed-origins: http://localhost:3000,http://localhost:3001,http://localhost:3002,http://localhost:3005,https://garage-lac.vercel.app

# OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

# Logging optimization
logging:
  level:
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql: WARN
    com.zaxxer.hikari: INFO

