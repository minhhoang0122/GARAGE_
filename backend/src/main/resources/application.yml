server:
  port: ${PORT:8081}
  shutdown: graceful
  # Enable response compression
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain
    min-response-size: 1024

spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/GaraManagement}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:talama123}
    driver-class-name: org.postgresql.Driver
    # HikariCP Connection Pool Optimization
    hikari:
      minimum-idle: 5
      maximum-pool-size: 15
      idle-timeout: 30000 # 30 seconds - release idle connections quickly
      pool-name: GaraHikariPool
      max-lifetime: 45000 # 45 seconds - avoid stale connections from cloud DB
      connection-timeout: 20000
      keepalive-time: 30000 # 30 seconds - keep connections warm
      leak-detection-threshold: 60000

  # Cloudinary Configuration
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME}
    api-key: ${CLOUDINARY_API_KEY}
    api-secret: ${CLOUDINARY_API_SECRET}

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 11MB
  
  jpa:
    hibernate:
      ddl-auto: update
#      naming:
#        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        # Batch optimization
        default_batch_fetch_size: 50
        jdbc:
          batch_size: 50
          fetch_size: 50
        order_inserts: true
        order_updates: true
        # Second-level cache
        cache:
          use_second_level_cache: true
          use_query_cache: true
          region:
            factory_class: org.hibernate.cache.jcache.JCacheRegionFactory
        javax:
          cache:
            missing_cache_strategy: create

  # Disable default security login page
  security:
    user:
      name: admin
      password: admin

  # Enable caching
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=300s

# JWT Configuration
jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000  # 24 hours in milliseconds

# CORS
cors:
  allowed-origins: http://localhost:3000,http://localhost:3001,http://localhost:3002,http://localhost:3005

# OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

# Logging optimization
logging:
  level:
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql: WARN
    com.zaxxer.hikari: INFO

